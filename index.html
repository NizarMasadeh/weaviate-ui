<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weaviate Explorer</title>
    <style>
        :root {
            --bg: #0d0f14;
            --panel: #141821;
            --panel-2: #1a1f2b;
            --panel-3: #20263400;
            --border: #262c3a;
            --border-soft: #1e2430;
            --ink: #e8ebf2;
            --ink-dim: #9ba4b5;
            --ink-faint: #626c7e;
            --accent: #6ee7a8;
            --accent-dim: #3d8f66;
            --accent-ink: #06140c;
            --blue: #7cb3ff;
            --violet: #b89dff;
            --amber: #e6b260;
            --rose: #f08a8a;
            --mono: 'SF Mono', 'JetBrains Mono', 'Fira Code', ui-monospace, Menlo, Consolas, monospace;
            --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Inter, sans-serif;
            --r: 8px;
            --shadow: 0 8px 30px rgba(0, 0, 0, .45);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--ink);
            font-family: var(--sans);
            font-size: 14px;
            line-height: 1.55;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #2a3140;
            border-radius: 99px;
            border: 2px solid var(--bg);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #353d4f;
        }

        /* ---------- top bar ---------- */
        header {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            padding: 11px 18px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 9px;
            font-family: var(--mono);
            font-weight: 600;
            font-size: 14px;
            letter-spacing: .3px;
            white-space: nowrap;
        }

        .brand .dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--ink-faint);
            transition: background .2s, box-shadow .2s;
        }

        .brand .dot.live {
            background: var(--accent);
            box-shadow: 0 0 0 3px rgba(110, 231, 168, .18);
        }

        .brand b {
            color: var(--accent);
        }

        .brand span {
            color: var(--ink-faint);
            font-weight: 500;
        }

        .conn {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 280px;
        }

        input,
        select,
        textarea,
        button {
            font-family: var(--mono);
            font-size: 12.5px;
            color: var(--ink);
            background: var(--panel-2);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 8px 11px;
            outline: none;
            transition: border-color .12s, background .12s;
        }

        input:focus,
        textarea:focus,
        select:focus {
            border-color: var(--accent-dim);
            background: #1c2230;
        }

        input::placeholder {
            color: var(--ink-faint);
        }

        #url {
            flex: 1;
            min-width: 200px;
        }

        #apikey {
            width: 190px;
        }

        button {
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }

        button:hover {
            border-color: #3a4356;
        }

        button.primary {
            background: var(--accent);
            color: var(--accent-ink);
            border-color: var(--accent);
            font-weight: 700;
        }

        button.primary:hover {
            filter: brightness(1.07);
            border-color: var(--accent);
        }

        button.ghost {
            background: transparent;
        }

        button.icon {
            padding: 7px 9px;
            line-height: 1;
        }

        button:disabled {
            opacity: .4;
            cursor: not-allowed;
        }

        .pill {
            font-family: var(--mono);
            font-size: 11px;
            padding: 4px 11px;
            border-radius: 99px;
            white-space: nowrap;
            font-weight: 600;
            letter-spacing: .3px;
        }

        .pill.ok {
            background: rgba(110, 231, 168, .13);
            color: var(--accent);
        }

        .pill.bad {
            background: rgba(240, 138, 138, .13);
            color: var(--rose);
        }

        .pill.idle {
            background: var(--panel-2);
            color: var(--ink-faint);
        }

        .ro {
            font-family: var(--mono);
            font-size: 10.5px;
            color: var(--amber);
            border: 1px solid rgba(230, 178, 96, .4);
            padding: 3px 9px;
            border-radius: 99px;
            letter-spacing: .5px;
        }

        /* ---------- layout ---------- */
        main {
            flex: 1;
            display: flex;
            min-height: 0;
        }

        aside {
            width: 290px;
            flex-shrink: 0;
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .aside-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 13px 16px 11px;
            font-family: var(--mono);
            font-size: 10.5px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--ink-faint);
        }

        .aside-head .count {
            background: var(--panel-2);
            color: var(--ink-dim);
            padding: 1px 8px;
            border-radius: 99px;
            font-size: 10.5px;
        }

        .coll-search {
            padding: 0 12px 10px;
        }

        .coll-search input {
            width: 100%;
            padding: 7px 10px;
            font-size: 12px;
        }

        .coll-list {
            overflow-y: auto;
            flex: 1;
            padding: 0 8px 12px;
        }

        .coll {
            padding: 10px 12px;
            border-radius: var(--r);
            cursor: pointer;
            margin-bottom: 3px;
            border: 1px solid transparent;
            transition: background .1s, border-color .1s;
        }

        .coll:hover {
            background: var(--panel-2);
        }

        .coll.active {
            background: var(--panel-2);
            border-color: var(--border);
        }

        .coll.active .name {
            color: var(--accent);
        }

        .coll .name {
            font-family: var(--mono);
            font-weight: 600;
            font-size: 13px;
            color: var(--ink);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .coll .meta {
            display: flex;
            gap: 10px;
            margin-top: 3px;
            font-family: var(--mono);
            font-size: 10.5px;
            color: var(--ink-faint);
        }

        .coll .meta b {
            color: var(--ink-dim);
            font-weight: 600;
        }

        section.content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .tabs {
            display: flex;
            gap: 2px;
            padding: 0 16px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
        }

        .tab {
            padding: 12px 15px 11px;
            font-family: var(--mono);
            font-size: 12px;
            cursor: pointer;
            color: var(--ink-dim);
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: color .12s;
        }

        .tab:hover {
            color: var(--ink);
        }

        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .pane {
            flex: 1;
            overflow: auto;
            min-height: 0;
        }

        /* ---------- toolbar ---------- */
        .toolbar {
            display: flex;
            gap: 9px;
            align-items: center;
            flex-wrap: wrap;
            padding: 12px 18px;
            border-bottom: 1px solid var(--border-soft);
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 5;
        }

        .toolbar .grow {
            flex: 1;
        }

        .toolbar label {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--ink-faint);
        }

        .toolbar .title {
            font-family: var(--mono);
            font-size: 13px;
            font-weight: 600;
            color: var(--ink);
        }

        .toolbar .title .badge {
            color: var(--ink-faint);
            font-weight: 500;
            margin-left: 8px;
            font-size: 11px;
        }

        #filter {
            width: 220px;
        }

        /* ---------- table ---------- */
        .tbl-wrap {
            padding: 0 0 40px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            font-family: var(--mono);
            font-size: 12px;
        }

        thead th {
            position: sticky;
            top: 53px;
            background: var(--panel);
            z-index: 4;
            text-align: left;
            padding: 9px 14px;
            color: var(--ink-faint);
            font-size: 10.5px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .6px;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        tbody td {
            padding: 9px 14px;
            border-bottom: 1px solid var(--border-soft);
            color: var(--ink-dim);
            vertical-align: top;
            max-width: 380px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        tbody tr {
            cursor: pointer;
            transition: background .08s;
        }

        tbody tr:hover td {
            background: var(--panel);
            color: var(--ink);
        }

        td.id {
            color: var(--blue);
            font-size: 11px;
        }

        td .null {
            color: var(--ink-faint);
            font-style: italic;
        }

        td .num {
            color: var(--amber);
        }

        td .bool {
            color: var(--violet);
        }

        .type-tag {
            display: inline-block;
            font-size: 9.5px;
            color: var(--ink-faint);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 0 5px;
            margin-left: 7px;
            vertical-align: middle;
            text-transform: none;
            letter-spacing: 0;
        }

        /* ---------- detail drawer ---------- */
        .drawer-bg {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .5);
            opacity: 0;
            pointer-events: none;
            transition: opacity .18s;
            z-index: 50;
        }

        .drawer-bg.open {
            opacity: 1;
            pointer-events: auto;
        }

        .drawer {
            position: fixed;
            top: 0;
            right: 0;
            height: 100%;
            width: 560px;
            max-width: 92vw;
            background: var(--panel);
            border-left: 1px solid var(--border);
            box-shadow: var(--shadow);
            transform: translateX(100%);
            transition: transform .2s cubic-bezier(.4, 0, .2, 1);
            z-index: 51;
            display: flex;
            flex-direction: column;
        }

        .drawer.open {
            transform: translateX(0);
        }

        .drawer-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 18px;
            border-bottom: 1px solid var(--border);
        }

        .drawer-head .t {
            font-family: var(--mono);
            font-weight: 600;
            font-size: 13px;
        }

        .drawer-head .t span {
            color: var(--ink-faint);
        }

        .drawer-body {
            overflow-y: auto;
            padding: 6px 0 30px;
            flex: 1;
        }

        .field {
            padding: 11px 18px;
            border-bottom: 1px solid var(--border-soft);
        }

        .field .k {
            font-family: var(--mono);
            font-size: 10.5px;
            text-transform: uppercase;
            letter-spacing: .6px;
            color: var(--ink-faint);
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .field .v {
            font-family: var(--mono);
            font-size: 12.5px;
            color: var(--ink);
            white-space: pre-wrap;
            word-break: break-word;
        }

        .field .v .null {
            color: var(--ink-faint);
            font-style: italic;
        }

        .copy {
            cursor: pointer;
            color: var(--ink-faint);
            font-size: 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 1px 7px;
            background: transparent;
        }

        .copy:hover {
            color: var(--accent);
            border-color: var(--accent-dim);
        }

        /* ---------- code / json panes ---------- */
        .codepane {
            padding: 16px 18px;
        }

        pre {
            font-family: var(--mono);
            font-size: 12px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 16px;
            margin: 0;
            overflow: auto;
            color: var(--ink-dim);
            white-space: pre;
            line-height: 1.6;
        }

        .json-key {
            color: var(--blue);
        }

        .json-str {
            color: var(--accent);
        }

        .json-num {
            color: var(--amber);
        }

        .json-bool {
            color: var(--violet);
        }

        .json-null {
            color: var(--ink-faint);
        }

        textarea#gql {
            width: 100%;
            min-height: 200px;
            resize: vertical;
            line-height: 1.6;
            font-size: 12.5px;
        }

        /* ---------- misc ---------- */
        .empty {
            color: var(--ink-faint);
            font-family: var(--mono);
            font-size: 13px;
            text-align: center;
            padding: 70px 20px;
        }

        .empty .big {
            font-size: 30px;
            opacity: .4;
            margin-bottom: 12px;
        }

        .msg {
            font-family: var(--mono);
            font-size: 12px;
            padding: 12px 14px;
            border-radius: var(--r);
            margin: 16px 18px;
            white-space: pre-wrap;
            line-height: 1.5;
        }

        .msg.err {
            background: rgba(240, 138, 138, .08);
            border: 1px solid rgba(240, 138, 138, .28);
            color: var(--rose);
        }

        .hint {
            color: var(--ink-faint);
            font-size: 11px;
            font-family: var(--mono);
            margin-top: 10px;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .7s linear infinite;
            display: inline-block;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-row {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
            padding: 50px;
            color: var(--ink-faint);
            font-family: var(--mono);
            font-size: 12px;
        }

        .toast {
            position: fixed;
            bottom: 22px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--panel-2);
            border: 1px solid var(--border);
            color: var(--ink);
            font-family: var(--mono);
            font-size: 12px;
            padding: 9px 16px;
            border-radius: 99px;
            opacity: 0;
            transition: all .2s;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>

<body>
    <header>
        <div class="brand"><span class="dot" id="livedot"></span>weaviate<b>·</b><span>explorer</span></div>
        <div class="conn">
            <input id="url" placeholder="https://weaviate-url" autocomplete="off" />
            <input id="apikey" type="password" placeholder="API key" autocomplete="off" />
            <button class="primary" onclick="connect()">Connect</button>
        </div>
        <span id="status" class="pill idle">offline</span>
        <span class="ro"
            title="This UI only issues GET requests and GraphQL Get queries. It never writes or deletes.">READ&#8209;ONLY</span>
    </header>

    <main>
        <aside>
            <div class="aside-head"><span>Collections</span><span class="count" id="collCount">0</span></div>
            <div class="coll-search"><input id="collFilter" placeholder="filter…" oninput="filterColls()" /></div>
            <div class="coll-list" id="collections">
                <div class="empty" style="padding:36px 14px;font-size:12px">Connect to load schema</div>
            </div>
        </aside>

        <section class="content">
            <div class="tabs">
                <div class="tab active" data-tab="objects" onclick="switchTab('objects')">Objects</div>
                <div class="tab" data-tab="schema" onclick="switchTab('schema')">Schema</div>
                <div class="tab" data-tab="graphql" onclick="switchTab('graphql')">GraphQL</div>
                <div class="tab" data-tab="meta" onclick="switchTab('meta')">Cluster</div>
            </div>
            <div class="pane" id="pane">
                <div class="empty">
                    <div class="big">◇</div>Enter your endpoint and key, then Connect.
                </div>
            </div>
        </section>
    </main>

    <div class="drawer-bg" id="drawerBg" onclick="closeDrawer()"></div>
    <div class="drawer" id="drawer">
        <div class="drawer-head">
            <div class="t" id="drawerTitle">Object</div>
            <button class="icon ghost" onclick="closeDrawer()">✕</button>
        </div>
        <div class="drawer-body" id="drawerBody"></div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const S = { url: '', key: '', meta: null, schema: null, active: null, tab: 'objects', limit: 25, rows: [], props: [] };
        const $ = id => document.getElementById(id);
        const esc = s => String(s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

        /* ---- persistence (URL only, never the key) ---- */
        try {
            const saved = JSON.parse(localStorage.getItem('wv-explorer') || '{}');
            if (saved.url) $('url').value = saved.url;
        } catch { }

        function toast(msg) {
            const t = $('toast'); t.textContent = msg; t.classList.add('show');
            clearTimeout(t._timer); t._timer = setTimeout(() => t.classList.remove('show'), 1600);
        }
        function copy(text) { navigator.clipboard.writeText(text).then(() => toast('Copied')); }

        function headers() {
            const h = { 'Content-Type': 'application/json' };
            if (S.key) h['Authorization'] = 'Bearer ' + S.key;
            return h;
        }
        async function api(path, opts = {}) {
            const res = await fetch(S.url.replace(/\/$/, '') + path, { headers: headers(), ...opts });
            const text = await res.text();
            let body; try { body = JSON.parse(text); } catch { body = text; }
            if (!res.ok) throw new Error(`HTTP ${res.status} — ${res.statusText}\n${typeof body === 'string' ? body : JSON.stringify(body, null, 2)}`);
            return body;
        }

        function setStatus(kind, txt, live) {
            const el = $('status'); el.className = 'pill ' + kind; el.textContent = txt;
            $('livedot').classList.toggle('live', !!live);
        }

        async function connect() {
            S.url = $('url').value.trim();
            S.key = $('apikey').value.trim();
            if (!S.url) { setStatus('bad', 'no url'); return; }
            setStatus('idle', 'connecting…');
            try {
                const meta = await api('/v1/meta');
                S.meta = meta;
                setStatus('ok', 'v' + (meta.version || '?'), true);
                localStorage.setItem('wv-explorer', JSON.stringify({ url: S.url }));
                await loadSchema();
            } catch (e) {
                setStatus('bad', 'failed');
                $('pane').innerHTML = `<div class="msg err">${esc(e.message)}</div>
      <div class="hint" style="margin:0 18px">This UI uses only the REST/GraphQL HTTP API — the same endpoint your <code>curl /v1/schema</code> hits. No gRPC needed. Check URL, key, and reachability.</div>`;
            }
        }

        async function loadSchema() {
            const schema = await api('/v1/schema');
            S.schema = schema;
            const classes = (schema.classes || []).sort((a, b) => a.class.localeCompare(b.class));
            S.classes = classes;
            $('collCount').textContent = classes.length;
            renderColls(classes);
            if (classes.length) selectCollection(classes[0].class);
            else $('pane').innerHTML = '<div class="empty"><div class="big">∅</div>No collections in this instance.</div>';
        }

        function renderColls(classes) {
            const box = $('collections');
            if (!classes.length) { box.innerHTML = '<div class="empty" style="padding:36px 14px;font-size:12px">No matches</div>'; return; }
            box.innerHTML = '';
            for (const c of classes) {
                const props = (c.properties || []).length;
                const vec = c.vectorizer && c.vectorizer !== 'none' ? c.vectorizer : null;
                const div = document.createElement('div');
                div.className = 'coll' + (c.class === S.active ? ' active' : '');
                div.dataset.name = c.class;
                div.innerHTML = `<div class="name">${esc(c.class)}</div>
      <div class="meta"><span><b>${props}</b> props</span>${vec ? `<span>${esc(vec)}</span>` : ''}</div>`;
                div.onclick = () => selectCollection(c.class);
                box.appendChild(div);
            }
        }

        function filterColls() {
            const q = $('collFilter').value.toLowerCase();
            renderColls((S.classes || []).filter(c => c.class.toLowerCase().includes(q)));
        }

        function selectCollection(name) {
            S.active = name;
            document.querySelectorAll('.coll').forEach(c => c.classList.toggle('active', c.dataset.name === name));
            render();
        }
        function switchTab(t) {
            S.tab = t;
            document.querySelectorAll('.tab').forEach(x => x.classList.toggle('active', x.dataset.tab === t));
            render();
        }
        function classDef() { return (S.schema?.classes || []).find(c => c.class === S.active); }

        /* ---------- JSON syntax highlight ---------- */
        function hl(obj) {
            const json = JSON.stringify(obj, null, 2);
            return esc(json)
                .replace(/&quot;(\w+)&quot;:/g, '<span class="json-key">"$1"</span>:')
                .replace(/: &quot;([^&]*)&quot;/g, ': <span class="json-str">"$1"</span>')
                .replace(/: (\d+\.?\d*)/g, ': <span class="json-num">$1</span>')
                .replace(/: (true|false)/g, ': <span class="json-bool">$1</span>')
                .replace(/: null/g, ': <span class="json-null">null</span>');
        }

        async function render() {
            const pane = $('pane');
            if (S.tab === 'meta') return pane.innerHTML = `<div class="codepane"><pre>${hl(S.meta || {})}</pre></div>`;
            if (S.tab === 'graphql') return renderGraphQL(pane);
            if (!S.active) return pane.innerHTML = '<div class="empty">Select a collection.</div>';
            if (S.tab === 'schema') return pane.innerHTML = `<div class="codepane"><pre>${hl(classDef() || {})}</pre></div>`;
            if (S.tab === 'objects') return renderObjects(pane);
        }

        /* ---------- objects table ---------- */
        function fmtCell(v) {
            if (v === null || v === undefined || v === '') return '<span class="null">∅</span>';
            if (typeof v === 'number') return `<span class="num">${esc(v)}</span>`;
            if (typeof v === 'boolean') return `<span class="bool">${v}</span>`;
            if (typeof v === 'object') return esc(JSON.stringify(v));
            return esc(String(v));
        }

        async function renderObjects(pane) {
            const def = classDef();
            const props = (def?.properties || []).map(p => ({ name: p.name, type: (p.dataType || [])[0] || '' }));
            S.props = props;
            pane.innerHTML = `
    <div class="toolbar">
      <span class="title">${esc(S.active)}<span class="badge" id="rowCount"></span></span>
      <span class="grow"></span>
      <input id="filter" placeholder="filter rows…" oninput="applyFilter()" />
      <label>limit</label>
      <select id="limitSel" onchange="S.limit=+this.value;loadObjects()">
        ${[10, 25, 50, 100, 250].map(n => `<option ${n === S.limit ? 'selected' : ''}>${n}</option>`).join('')}
      </select>
      <button class="ghost" onclick="loadObjects()">↻ Refresh</button>
    </div>
    <div class="tbl-wrap" id="tblWrap"><div class="loading-row"><span class="spinner"></span> querying…</div></div>`;
            loadObjects();
        }

        async function loadObjects() {
            const wrap = $('tblWrap');
            if (wrap) wrap.innerHTML = '<div class="loading-row"><span class="spinner"></span> querying…</div>';
            try {
                const fields = S.props.map(p => p.name).join(' ');
                const query = `{ Get { ${S.active}(limit: ${S.limit}) { ${fields} _additional { id creationTimeUnix } } } }`;
                const data = await api('/v1/graphql', { method: 'POST', body: JSON.stringify({ query }) });
                if (data.errors) throw new Error(JSON.stringify(data.errors, null, 2));
                S.rows = data.data?.Get?.[S.active] || [];
                drawTable(S.rows);
            } catch (e) {
                if (wrap) wrap.innerHTML = `<div class="msg err">${esc(e.message)}</div>`;
            }
        }

        function applyFilter() {
            const q = $('filter').value.toLowerCase();
            if (!q) return drawTable(S.rows);
            drawTable(S.rows.filter(r => JSON.stringify(r).toLowerCase().includes(q)));
        }

        function drawTable(rows) {
            const wrap = $('tblWrap');
            const rc = $('rowCount'); if (rc) rc.textContent = `${rows.length} object${rows.length === 1 ? '' : 's'}`;
            if (!rows.length) { wrap.innerHTML = '<div class="empty"><div class="big">∅</div>No objects.</div>'; return; }
            const cols = S.props;
            let h = '<table><thead><tr><th>id</th>';
            for (const c of cols) h += `<th>${esc(c.name)}<span class="type-tag">${esc(c.type)}</span></th>`;
            h += '</tr></thead><tbody>';
            rows.forEach((r, i) => {
                h += `<tr onclick="openDrawer(${i})">`;
                const id = r._additional?.id || '';
                h += `<td class="id" title="${esc(id)}">${esc(id.slice(0, 8))}…</td>`;
                for (const c of cols) {
                    let v = r[c.name];
                    const disp = (v && typeof v === 'object') ? JSON.stringify(v) : v;
                    h += `<td title="${esc(disp ?? '')}">${fmtCell(v)}</td>`;
                }
                h += '</tr>';
            });
            h += '</tbody></table>';
            wrap.innerHTML = h;
            S._filtered = rows;
        }

        /* ---------- detail drawer ---------- */
        function openDrawer(i) {
            const r = (S._filtered || S.rows)[i];
            if (!r) return;
            const id = r._additional?.id || '';
            $('drawerTitle').innerHTML = `${esc(S.active)} <span>· object</span>`;
            let h = '';
            // id + system fields first
            h += fieldRow('_id', id, true);
            if (r._additional?.creationTimeUnix) {
                const d = new Date(+r._additional.creationTimeUnix);
                h += fieldRow('_created', d.toISOString(), false);
            }
            for (const p of S.props) {
                let v = r[p.name];
                if (v && typeof v === 'object') v = JSON.stringify(v, null, 2);
                h += fieldRow(p.name, v, false, p.dataType);
            }
            $('drawerBody').innerHTML = h;
            $('drawer').classList.add('open');
            $('drawerBg').classList.add('open');
        }
        function fieldRow(k, v, copyable) {
            const empty = v === null || v === undefined || v === '';
            const val = empty ? '<span class="null">∅ empty</span>' : esc(String(v));
            const btn = copyable ? `<button class="copy" onclick="copy('${esc(v)}')">copy</button>` : '';
            return `<div class="field"><div class="k">${esc(k)}${btn}</div><div class="v">${val}</div></div>`;
        }
        function closeDrawer() { $('drawer').classList.remove('open'); $('drawerBg').classList.remove('open'); }
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

        /* ---------- graphql console ---------- */
        function renderGraphQL(pane) {
            const sample = S.active
                ? `{\n  Get {\n    ${S.active}(limit: 5) {\n      ${(S.props[0]?.name) || ''}\n      _additional { id }\n    }\n  }\n}`
                : `{\n  Get {\n    YourCollection(limit: 5) {\n      _additional { id }\n    }\n  }\n}`;
            pane.innerHTML = `
    <div class="toolbar">
      <span class="title">GraphQL console</span>
      <span class="grow"></span>
      <span style="font-family:var(--mono);font-size:11px;color:var(--ink-faint)">POST /v1/graphql · read queries</span>
      <button class="primary" onclick="runGQL()">▶ Run</button>
    </div>
    <div class="codepane">
      <textarea id="gql" spellcheck="false">${esc(sample)}</textarea>
      <div style="height:14px"></div>
      <div id="gqlOut"></div>
    </div>`;
            $('gql').addEventListener('keydown', e => {
                if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); runGQL(); }
            });
        }
        async function runGQL() {
            const out = $('gqlOut');
            out.innerHTML = '<div class="loading-row"><span class="spinner"></span> running…</div>';
            try {
                const data = await api('/v1/graphql', { method: 'POST', body: JSON.stringify({ query: $('gql').value }) });
                out.innerHTML = `<pre>${hl(data)}</pre>`;
            } catch (e) {
                out.innerHTML = `<div class="msg err" style="margin:0">${esc(e.message)}</div>`;
            }
        }

        /* ---------- connect on enter ---------- */
        ['url', 'apikey'].forEach(id => $(id).addEventListener('keydown', e => { if (e.key === 'Enter') connect(); }));
    </script>
</body>

</html>
